apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-galaxy
  namespace: default
  labels:
    app: cluster-galaxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cluster-galaxy
  template:
    metadata:
      labels:
        app: cluster-galaxy
    spec:
      containers:
        - name: cluster-galaxy
          image: YOUR_DOCKERHUB_USERNAME/cluster-galaxy:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-galaxy-svc
  namespace: default
spec:
  selector:
    app: cluster-galaxy
  ports:
    - port: 80
      targetPort: 80
  type: NodePort
